<div class="game-wrapper" oncontextmenu="return false;">
  @if (activeMinigame === 'avoid-the-junk') {
    <app-avoid-the-junk
      [petSprite]="getPetSpriteAsset()"
      [musicEnabled]="isMusicEnabled()"
      [musicVolume]="getMusicVolume()"
      (gameClosed)="handleMinigameClosed($event)">
    </app-avoid-the-junk>
  }

  @if (!isGameLoading) {

    <app-level-bar
      [level]="currentPlayerLevel"
      [currentLevelExp]="getCurrentLevelExp()"
      [expForNextLevel]="getExpForNextLevel()"
      [expProgressPercent]="getExpProgressPercent()">
    </app-level-bar>

  }

  <app-game-hud
    [isGameLoading]="isGameLoading"
    [isSavingRoom]="isSavingRoom"
    [toastMessage]="toastMessage"
    [isVisiting]="isVisiting"
    [visitingUsername]="visitingUsername"
    [isHomeViewMode]="isHomeViewMode"
    [isCameraLockedToPet]="isCameraLockedToPet"
    (toggleCameraLock)="toggleCameraLock()"
    (zoomIn)="zoomIn()"
    (zoomOut)="zoomOut()"
    (joystickUpdate)="handleJoystickUpdate($event)">
  </app-game-hud>


  <div
    id="game-container"
    (dragover)="onDragOver($event)"
    (drop)="onDrop($event)"></div>

  <app-game-side-panels
    #sidePanels
    [isVisiting]="isVisiting"
    [isHomeViewMode]="isHomeViewMode"
    [isHosting]="isHosting"
    [visitingUsername]="visitingUsername"
    [hostingCount]="hostingCount"
    [currentVisitorIds]="currentVisitorIds"
    (returnHome)="returnHome()"
    (launchMinigame)="handleLaunchMinigame($event)">
  </app-game-side-panels>


  <app-game-chat-controls
    [isHomeViewMode]="isHomeViewMode"
    [roomOwnerId]="roomOwnerId"
    [emojis]="emojis"
    (returnHome)="returnHome()"
    (talk)="talk($event)"
    (inputFocus)="onInputFocus()"
    (inputBlur)="onInputBlur()">
  </app-game-chat-controls>

  <app-game-tutorial-overlay
    [visible]="showTutorial"
    [tutorialStep]="currentTutorialStep"
    [tutorialMessage]="getTutorialMessage()"
    [tutorialSpotStyles]="tutorialSpotStyles"
    [stepIndex]="tutorialStepIndex"
    [totalSteps]="totalTutorialSteps"
    [isLastStep]="isTutorialLastStep"
    (skip)="skipTutorial()"
    (next)="nextTutorialStep()">
  </app-game-tutorial-overlay>
</div>
