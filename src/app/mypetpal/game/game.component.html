<div class="game-wrapper" oncontextmenu="return false;">
    <div id="game-container"></div>
    
    <div class="game-loading-overlay" *ngIf="isGameLoading">
        <app-paw-spinner [diameter]="80" color="#7c3aed"></app-paw-spinner>
    </div>

    <!-- Neighborhood Sidebar -->
    <app-social-panel></app-social-panel>

    <div class="zoom-controls">
        <button (click)="zoomIn()" title="Zoom In">+</button>
        <button (click)="zoomOut()" title="Zoom Out">-</button>
    </div>

    <!-- Chat Controls -->
    <div class="chat-controls">
        <div class="chat-input-wrapper">
            <input #chatInput 
                   type="text" 
                   maxlength="100"
                   placeholder="Speak to the room..." 
                   (focus)="onInputFocus()"
                   (blur)="onInputBlur()"
                   (keydown)="$event.stopPropagation()"
                   (keyup.enter)="talk(chatInput.value); chatInput.value = ''" />
            <div class="emoji-selector-wrapper">
                <button class="emoji-toggle-btn" (click)="$event.stopPropagation(); toggleEmojiPicker()" title="Add Emoji">🐾</button>
                <div class="emoji-dropdown" *ngIf="isEmojiPickerOpen" (click)="$event.stopPropagation()">
                    <button class="emoji-btn" *ngFor="let emoji of emojis" (click)="addEmoji(emoji)" 
                            [title]="'Add ' + emoji">
                        {{emoji}}
                    </button>
                </div>
            </div>
            <span class="char-counter">{{ chatInput.value.length }}/100</span>
            <button class="talk-btn" (click)="talk(chatInput.value); chatInput.value = ''">Talk</button>
        </div>  
    </div>
</div>
