@if (isVisiting && !isGameLoading) {
  <div class="visit-mode-status">
    {{ visitingUsername }}
  </div>
}

@if (isGameLoading) {
  <div class="game-loading-overlay">
    <div class="loading-content">
      <app-paw-spinner [diameter]="80" color="#7c3aed"></app-paw-spinner>
      @if (selectedLoadingTip) {
        <p class="loading-tip">{{ selectedLoadingTip }}</p>
      }
    </div>
  </div>
}

@if (isSavingRoom) {
  <div class="save-status">
    <app-paw-spinner
      [diameter]="40"
      color="#7c3aed"
      icon="💾"></app-paw-spinner>
  </div>
}

@if (toastMessage) {
  <div class="toast-notification">
    <span class="warning-icon">⚠️</span>
    {{ toastMessage }}
  </div>
}

<div class="zoom-controls">
  <button type="button" class="camera-lock-toggle" [class.active]="isCameraLockedToPet" (click)="onToggleCameraLock()" title="Lock camera to pet">
    <img src="assets/lock-camera.png" alt="Lock camera to pet" />
  </button>
  <button type="button" (click)="onZoomIn()" title="Zoom In">+</button>
  <button type="button" (click)="onZoomOut()" title="Zoom Out">-</button>
</div>

@if (!isHomeViewMode) {
  <div class="mobile-joystick-container">
    <app-mobile-joystick (joystickUpdate)="onJoystickUpdate($event)"></app-mobile-joystick>
  </div>
}
