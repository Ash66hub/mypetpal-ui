<mat-toolbar color="primary" class="custom-toolbar">
  <img src="/assets/logo.png" alt="MyPetPal Logo" class="header-logo" />
  <img src="/assets/logo-text.png" alt="MyPetPal Logo" class="header-logo" />

  <!-- Spacer to push the user icon to the right -->
  <span class="spacer"></span>

  <!-- User Icon with menu -->
  <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu" class="profile-trigger">
    <span
      class="pet-thumb"
      [attr.aria-label]="'User avatar ' + avatarLetter"
      role="img"
      >{{ avatarLetter }}</span>
  </button>
  <mat-menu #userMenu="matMenu">
    <button mat-menu-item (click)="openProfile()">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>
    <button mat-menu-item (click)="logoutUser()">
      <mat-icon>exit_to_app</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
