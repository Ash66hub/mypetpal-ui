<div
  class="paw-spinner-wrapper"
  [style.width.px]="diameter"
  [style.height.px]="diameter">
  <svg class="spinner-ring" viewBox="0 0 50 50">
    <circle
      cx="25"
      cy="25"
      r="20"
      fill="none"
      stroke-width="4"
      [style.stroke]="color"></circle>
  </svg>
  <div
    class="paw-icon"
    [style.font-size.px]="diameter * 0.45"
    [style.color]="color">
    {{ icon }}
  </div>
</div>
